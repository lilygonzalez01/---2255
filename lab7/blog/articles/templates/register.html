{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - создание аккаунта</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}">
</head>
<body>
    <div class="header">
        <a href="{% url 'archive' %}"><img src="{% static 'img/dpb-logo.png' %}" /></a>
    </div>
    <div class="archive">
        <a href="{% url 'archive' %}" class="return-link">&larr; К списку статей</a>
        <div class="form-section">
            <h2>Создание аккаунта</h2>
            <form method="POST">{% csrf_token %}
                <input type="text" name="username" placeholder="Логин" value="{{ form.username }}">
                <input type="email" name="email" placeholder="Email" value="{{ form.email }}">
                <input type="password" name="password" placeholder="Пароль">
                <input type="submit" value="Создать учётную запись">
            </form>
            {% if form.errors %}
            <div class="field-errors">{{ form.errors }}</div>
            {% endif %}
            <p class="login-hint">Уже зарегистрированы? <a href="{% url 'login' %}">Войти</a></p>
        </div>
    </div>
</body>
</html>
